services:
  teslamatefix:
    # Remplacer <owner> par le namespace GitHub publiant l'image.
    image: ghcr.io/<owner>/teslamatefix:latest
    restart: always
    depends_on:
      - database
    ports:
      # Expose le port 3001 de l'hÃīte. Mettre derriÃĻre un reverse-proxy HTTPS
      # (nginx/Caddy/Traefik) en production â voir docs/INTEGRATION_TESLAMATE.md.
      - "3001:3001"
    environment:
      # --- Base de donnÃĐes ---
      # Utilisateur dÃĐdiÃĐ `teslamatefix` (privilÃĻges restreints, pas d'accÃĻs
      # Ã  `tokens` ni Ã  `schema_migrations`). Voir init-teslamatefix-user.sql.
      DATABASE_URL: "postgresql://teslamatefix:${TMFIX_DB_PASSWORD}@database:5432/teslamate?schema=public"

      # --- Authentification ---
      AUTH_USERNAME: "${TMFIX_AUTH_USERNAME:-admin}"
      # Hash bcrypt gÃĐnÃĐrÃĐ par `npm run auth:hash` (cf. docs/INSTALL.md).
      AUTH_PASSWORD_HASH: "${TMFIX_AUTH_PASSWORD_HASH}"
      # ClÃĐ de session, 32 caractÃĻres minimum. `openssl rand -base64 32`.
      AUTH_SECRET: "${TMFIX_AUTH_SECRET}"

      # --- Optionnel ---
      DEFAULT_LOCALE: "${TMFIX_DEFAULT_LOCALE:-fr}"
      LOG_LEVEL: "${TMFIX_LOG_LEVEL:-info}"
      # READ_ONLY=true masque tous les boutons de mutation : recommandÃĐ pour
