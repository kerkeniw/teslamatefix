# ----------------------------------------------------------------------------
# TeslaMateFix — bloc à coller dans le `docker-compose.yml` de TeslaMate
# (à côté des services `teslamate`, `database`, `grafana`, `mosquitto`).
#
# Installation grand public (depuis v0.2.0) :
#   1. Coller le bloc `services.teslamatefix` ci-dessous + le `volumes:`.
#   2. `docker compose up -d teslamatefix`.
#   3. Ouvrir http://<host>:3001, login `admin` / `admin`.
#   4. Choisir un nouveau mot de passe lors de la redirection forcée.
#
# Aucune variable d'env spécifique à TeslaMateFix n'est requise : l'image
# réutilise `DATABASE_USER` / `DATABASE_PASS` / `DATABASE_NAME` du compose
# TeslaMate (déjà définies dans le `.env`) pour assembler le DSN, et
# bootstrappe tous les secrets dans le volume `teslamatefix-data` au
# premier démarrage.
#
# Pour les setups avancés (rôle PG dédié, HTTPS reverse-proxy, hash
# bcrypt fourni en env, etc.), voir `docs/INSTALL.md` section « Hardening ».
# ----------------------------------------------------------------------------

services:
  teslamatefix:
    image: wkerkeni/teslamatefix:latest
    restart: always
    depends_on:
      - database
    ports:
      # Expose le port 3001 sur l'hôte. Mettre derrière un reverse-proxy
      # HTTPS en production — voir docs/INTEGRATION_TESLAMATE.md.
      - "3001:3001"
    environment:
      # Réutilise les variables conventionnelles du compose TeslaMate.
      # Si vous préférez fournir un DSN complet, définir DATABASE_URL ici
      # à la place — l'entrypoint l'utilisera prioritairement.
      DATABASE_USER: "${DATABASE_USER:-teslamate}"
      DATABASE_PASS: "${DATABASE_PASS}"
      DATABASE_NAME: "${DATABASE_NAME:-teslamate}"
      # Chemin (dans le container) de la clé publique Tesla servie sur
      # /.well-known/appspecific/com.tesla.3p.public-key.pem. Valeur par défaut
      # déjà dans l'image ; surchargez seulement si vous montez ailleurs.
      TESLA_PUBLIC_KEY_FILE: "/well-known/com.tesla.3p.public-key.pem"
    volumes:
      # Persiste auth_secret + username + password_hash entre redémarrages.
      # Le volume nommé est créé automatiquement par Docker au premier `up`.
      - teslamatefix-data:/data
      # Clé publique Tesla (Fleet API). Monter en lecture seule le dossier hôte
      # contenant `com.tesla.3p.public-key.pem`. TeslaMateFix la sert alors sur
      # https://<DOMAIN>/.well-known/appspecific/com.tesla.3p.public-key.pem
      # (via rewrite interne) — aucun service web supplémentaire nécessaire.
      #
      # ⚠️ Le container tourne en user `node` (uid 1000) : le bind-mount conserve
      # les permissions de l'hôte. Rendre le fichier lisible (clé publique → sans
      # risque) sinon EACCES :
      #   chmod 755 tesla-well-known && chmod 644 tesla-well-known/com.tesla.3p.public-key.pem
      - ./tesla-well-known:/well-known:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  teslamatefix-data:
